      .used { fill: #526072; font: 14px "Segoe UI", sans-serif; }
      .sample { fill: #4f6b83; font: 700 15px "Segoe UI", sans-serif; letter-spacing: 2px; }
    </style>
  </defs>

  <rect width="960" height="620" rx="34" fill="url(#bg)"/>
